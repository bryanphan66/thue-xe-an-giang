<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Thuê Xe Mỹ Hoà — Dịch vụ cho thuê xe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --ink:#0B0B0C;
  --surface:#FFFFFF;
  --bg:#FAFAFA;
  --muted:#6B7280;
  --hairline:#E7E7E9;
  --stage:#0B0B0C;
  --stage-ink:#FAFAFA;
  --stage-muted:#9A9CA3;
  --stage-hairline:#1F2024;
  --accent:#2D5BFF;
  --r-card:14px;
  --r-btn:13px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Be Vietnam Pro',system-ui,sans-serif;
  background:#e6e6e9;
  color:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  letter-spacing:-0.01em;
  -webkit-font-smoothing:antialiased;
}
@media (max-width:520px){ body{padding:0;} }

/* ===== Phone shell ===== */
.phone{
  position:relative;
  width:min(412px, 100vw);
  height:min(872px, 100vh);
  background:var(--bg);
  border-radius:42px;
  box-shadow:0 40px 90px -30px rgba(11,11,12,.45), 0 2px 8px rgba(11,11,12,.12);
  overflow:hidden;
  border:1px solid rgba(11,11,12,.06);
}
@media (max-width:520px){ .phone{border-radius:0;height:100vh;width:100vw;box-shadow:none;border:none;} }

.statusbar{
  position:absolute;top:0;left:0;right:0;height:env(safe-area-inset-top,0);
  z-index:60;pointer-events:none;
}
.scroll{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:auto;
}
.scroll::-webkit-scrollbar{width:0;height:0;display:none;}
.scroll{scrollbar-width:none;}

/* ===== Layout primitives ===== */
.container{padding-left:22px;padding-right:22px;}
.section{padding-top:52px;}
.eyebrow{
  font-size:11.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;
}
.eyebrow.on-dark{color:var(--stage-muted);}
.hairline{height:1px;background:var(--hairline);border:none;margin:0;}
.muted{color:var(--muted);}

h1,h2,h3{margin:0;font-weight:800;letter-spacing:-0.035em;line-height:1.02;}
.display{font-size:46px;line-height:.98;font-weight:800;letter-spacing:-0.045em;}
.h2{font-size:27px;font-weight:800;letter-spacing:-0.035em;line-height:1.06;}
.lead{font-size:17px;line-height:1.55;color:var(--muted);font-weight:400;}
.body{font-size:17px;line-height:1.6;font-weight:400;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  min-height:52px;padding:0 22px;border-radius:var(--r-btn);
  font-family:inherit;font-size:16.5px;font-weight:600;letter-spacing:-0.01em;
  cursor:pointer;border:1px solid transparent;width:100%;
  transition:transform .15s ease, background .2s ease, border-color .2s ease, color .2s ease;
}
.btn:active{transform:scale(.975);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#26262a;}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--hairline);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-on-dark{background:var(--stage-ink);color:var(--ink);}
.btn-ghost-on-dark{background:transparent;color:var(--stage-ink);border-color:var(--stage-hairline);}
.btn-ghost-on-dark:hover{border-color:var(--stage-ink);}
.btn-sm{min-height:44px;font-size:15px;padding:0 16px;width:auto;}

/* ===== Cards ===== */
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-card);}

/* ===== Image placeholder ===== */
.imgph{
  position:relative;overflow:hidden;background:#f1f1f3;
  background-image:repeating-linear-gradient(135deg,rgba(11,11,12,.045) 0 1px,transparent 1px 11px);
  display:flex;align-items:center;justify-content:center;
}
.imgph.dark{
  background:#141416;
  background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 1px,transparent 1px 11px);
}
.imgph .lbl{
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.04em;
  color:var(--muted);text-transform:uppercase;background:rgba(255,255,255,.7);
  padding:5px 10px;border-radius:6px;border:1px solid var(--hairline);backdrop-filter:blur(2px);
}
.imgph.dark .lbl{color:var(--stage-muted);background:rgba(11,11,12,.5);border-color:var(--stage-hairline);}

/* ===== Reveal (variant via --rv-hidden) ===== */
.reveal{opacity:0;transform:var(--rv-hidden,translateY(16px));transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);will-change:transform,opacity;}
.reveal.in{opacity:1;transform:none;}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important;transition:none!important;}}

/* ===== Marquee (testimonials) ===== */
.marquee{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent 0,#000 7%,#000 93%,transparent 100%);mask-image:linear-gradient(90deg,transparent 0,#000 7%,#000 93%,transparent 100%);}
.marquee-track{display:flex;width:max-content;animation:marquee 52s linear infinite;}
.marquee:hover .marquee-track,.marquee:active .marquee-track{animation-play-state:paused;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@media (prefers-reduced-motion:reduce){.marquee-track{animation:none;flex-wrap:wrap;gap:14px;padding:0 22px;}}
.tcard{flex:0 0 300px;margin-right:14px;}

/* ===== Ambient motion (subtle, GPU-only) ===== */
.hero-photo{animation:heroZoom 16s ease-in-out infinite alternate;}
@keyframes heroZoom{from{transform:scale(1);}to{transform:scale(1.045);}}
.dot-pulse{position:relative;}
.dot-pulse::after{content:"";position:absolute;inset:-5px;border-radius:99px;border:1px solid var(--accent);opacity:.5;animation:dotPulse 2.6s ease-out infinite;}
@keyframes dotPulse{0%{transform:scale(.7);opacity:.6;}70%{opacity:0;}100%{transform:scale(2.1);opacity:0;}}
.stickybar{animation:barUp .6s .25s cubic-bezier(.16,1,.3,1) both;}
@keyframes barUp{from{transform:translateY(120%);}to{transform:none;}}
.car-card{transition:transform .35s cubic-bezier(.16,1,.3,1),border-color .3s ease;}
.car-card:hover{transform:translateY(-3px);border-color:#d9d9dd;}
@media (prefers-reduced-motion:reduce){.hero-photo,.dot-pulse::after,.stickybar{animation:none!important;}}

/* ===== Sticky contact bar ===== */
.stickybar{
  position:absolute;left:0;right:0;bottom:0;z-index:50;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom,0));
  background:rgba(250,250,250,.72);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-top:1px solid rgba(231,231,233,.9);
  display:flex;gap:10px;
}
.stickybar .btn{flex:1;}

/* ===== Screen transition ===== */
.screen{animation:screenIn .42s cubic-bezier(.16,1,.3,1);}
@keyframes screenIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.screen{animation:none;}}

/* ===== model-viewer ===== */
model-viewer{width:100%;height:100%;--poster-color:transparent;background:transparent;}
.mv-stage{background:radial-gradient(120% 90% at 50% 18%, #1b1c20 0%, #0B0B0C 62%);}

/* spinner */
.spin{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.18);border-top-color:rgba(255,255,255,.85);animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-hint{animation:hintFade 5.5s ease forwards;}
@keyframes hintFade{0%,55%{opacity:1;}100%{opacity:0;}}

a{color:inherit;text-decoration:none;}
.linkrow{display:flex;align-items:center;gap:12px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="app/data.jsx"></script>
<script type="text/babel" data-presets="react" src="app/icons.jsx"></script>
<script type="text/babel" data-presets="react" src="app/ui.jsx"></script>
<script type="text/babel" data-presets="react" src="app/home.jsx"></script>
<script type="text/babel" data-presets="react" src="app/detail.jsx"></script>
<script type="text/babel" data-presets="react" src="app/app.jsx"></script>
</body>
</html>
