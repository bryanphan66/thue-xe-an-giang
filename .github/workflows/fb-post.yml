name: Auto-post to Facebook Page

# Tự đăng bảng giá lên Page: theo lịch (thứ 2 hàng tuần, 08:00 giờ VN) + bấm chạy tay.
on:
  schedule:
    - cron: "0 1 * * 1" # 01:00 UTC = 08:00 Việt Nam, mỗi thứ Hai
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Chỉ xem trước nội dung, không đăng (true/false)"
        default: "false"

concurrency:
  group: fb-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Post fleet & prices to Facebook
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node scripts/fb-post.mjs
