name: Auto-post to Facebook Page

# Tự đăng bài (nội dung AI) lên Page: 3 lần/ngày + bấm chạy tay.
on:
  schedule:
    - cron: "0 1,5,11 * * *" # 08:00 · 12:00 · 18:00 giờ Việt Nam (UTC+7)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Chỉ xem trước nội dung, không đăng (true/false)"
        default: "false"

concurrency:
  group: fb-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Post fleet & prices to Facebook
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node scripts/fb-post.mjs
